name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: agent-hq-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, agent-hq-prod]
    env:
      PROD_REPO: /Users/nordini/agent-hq
    steps:
      - name: Sync canonical production checkout
        working-directory: ${{ env.PROD_REPO }}
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Build API
        working-directory: ${{ env.PROD_REPO }}/api
        run: npm ci && npm run build

      - name: Restart API
        run: |
          pm2 delete agent-hq-api || true
          pm2 start "${{ env.PROD_REPO }}/ecosystem.production.config.js" --only agent-hq-api

      - name: Build UI
        working-directory: ${{ env.PROD_REPO }}/ui
        run: npm ci && npm run build

      - name: Restart UI
        run: |
          pm2 delete agent-hq-ui || true
          pm2 start "${{ env.PROD_REPO }}/ecosystem.production.config.js" --only agent-hq-ui
          pm2 save

      - name: Health check API
        run: |
          for i in {1..30}; do
            curl -f http://localhost:3501/health && exit 0
            sleep 1
          done
          exit 1

      - name: Health check UI
        run: |
          for i in {1..30}; do
            curl -f -I http://localhost:3500 && exit 0
            sleep 1
          done
          exit 1
